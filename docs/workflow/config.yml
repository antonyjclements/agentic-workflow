workflow:
  implementation:
    test_policy: acceptance-first
  steps:
    prd:
      skill: ""
    brainstorm:
      skill: ""
    create_spec:
      skill: ""
    request_human_review:
      skill: ""
    plan:
      skill: ""
    review:
      skill: ""
    create_tickets:
      skill: ""
    work:
      skill: ""
    check_workflow_compliance:
      skill: ""
    commit:
      skill: ""
    commit_push_pr:
      skill: ""
    monitor_pipeline:
      skill: ""
  auxiliary:
    refresh:
      skill: ""
    debug:
      skill: ""
    create_worktree:
      skill: ""
    capture:
      skill: ""
    discover_standards:
      skill: ""
    research_slack:
      skill: ""
    resolve_pr_feedback:
      skill: ""
    synthesize_memory:
      skill: ""
pull_request:
  template:
    title: ""
    body: ""
git:
  commit:
    format: conventional
    scope_required: false
    template: "<type>(<scope>): <description>"
    allowed_types:
      - feat
      - fix
      - docs
      - chore
      - refactor
      - test
      - ci
      - build
      - perf
      - style
    examples:
      - "docs(readme): update usage guide"
post_pr:
  ci_monitor:
    provider: manual
human_review:
  spec:
    reviewers: []
  plan:
    reviewers: []
gates:
  enabled: true
  state_file: .aw-gate-state.json
  checks:
    review:
      mode: commit
      paths:
        - "."
        - ":(exclude)docs"
    check_workflow_compliance:
      mode: age
      max_age_hours: 168
    synthesize:
      mode: age
      max_age_hours: 336
telemetry:
  enabled: false
  path: docs/metrics/events.jsonl
  rotation: monthly
  retention_months: 12
org_knowledge:
  source: ""
  ref: main
  cache_dir: .aw-org-cache
  paths:
    learnings: learnings
    standards: standards
trace:
  enabled: false
  spec_paths:
    - "docs/features/*/spec.md"
  test_paths:
    - "*.feature"
    - "*.test.ts"
    - "*.test.tsx"
    - "*.spec.ts"
  code_paths:
    - "src"
  require_code_anchor: false
workflow_trace:
  enabled: false
  path: .aw/workflow-trace.jsonl
  require_tier: true
  required_gates:
    - review
    - check_workflow_compliance
